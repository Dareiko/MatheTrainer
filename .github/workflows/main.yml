name: Build Android APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2
          cache-disabled: true

      - name: Build APK
        run: |
          gradle :app:assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx2048m"
          # Premenovanie samotného súboru .apk na verziu podľa čísla buildu
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/MatheTrainer_v0.${{ github.run_number }}.apk
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MatheTrainer_v0.${{ github.run_number }}
          path: app/build/outputs/apk/debug/MatheTrainer_v0.${{ github.run_number }}.apk
