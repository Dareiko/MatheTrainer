name: Build Android APK

on:
  push:
    branches: [ "main" ]

env:
  # Týmto povieme GitHubu, aby okamžite použil Node.js 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5 # Aktualizované na v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5 # Aktualizované na v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MatheTrainer-APK
          path: app/build/outputs/apk/debug/app-debug.apk
