name: Build Android APK

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # v4 je momentálne stabilnejšia pri sieťových chybách

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2
          cache-disabled: true # Vypneme cache, kým má GitHub výpadok

      - name: Build with Gradle
        # Pridali sme --stacktrace, aby sme v prípade chyby videli presný dôvod
        run: gradle :app:assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MatheTrainer-APK
          path: app/build/outputs/apk/debug/app-debug.apk
